set timeout=0
set default=0
set gfxmode=text
set gfxpayload=text
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_input serial console
terminal_output serial console
search --no-floppy --file /boot/aurora.elf --set=root

menuentry "Aurora Kernel" {
    multiboot2 ($root)/boot/aurora.elf
    boot
}
